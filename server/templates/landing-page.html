<!doctype html>
<html lang="en">
  <head>
    <title>OG_TITLE_PLACEHOLDER</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0d0d" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="OG_TITLE_PLACEHOLDER" />
    <meta property="og:description" content="OG_DESCRIPTION_PLACEHOLDER" />
    <meta property="og:image" content="OG_IMAGE_PLACEHOLDER" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="OG_URL_PLACEHOLDER" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="APP_NAME_PLACEHOLDER" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OG_TITLE_PLACEHOLDER" />
    <meta name="twitter:description" content="OG_DESCRIPTION_PLACEHOLDER" />
    <meta name="twitter:image" content="OG_IMAGE_PLACEHOLDER" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "SF Pro Display", sans-serif;
        background: #0d0d0d;
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        -webkit-font-smoothing: antialiased;
      }
      .page {
        max-width: 400px;
        width: 100%;
        text-align: center;
      }
      .app-icon {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        margin: 0 auto 24px;
        display: block;
      }
      .app-name {
        font-size: 13px;
        font-weight: 500;
        color: rgba(255,255,255,0.5);
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-bottom: 32px;
      }
      .content-section {
        margin-bottom: 32px;
      }
      .user-emoji {
        font-size: 80px;
        line-height: 1.1;
        margin-bottom: 16px;
      }
      .username {
        font-size: 24px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .verified-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
        flex-shrink: 0;
      }
      .verified-badge svg {
        width: 20px;
        height: 20px;
      }
      .subtitle {
        font-size: 15px;
        color: rgba(255,255,255,0.5);
        margin-top: 8px;
        line-height: 1.5;
      }
      .post-image {
        width: 100%;
        max-width: 320px;
        border-radius: 12px;
        margin: 0 auto 16px;
        display: block;
      }
      .post-meta {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 15px;
        color: rgba(255,255,255,0.7);
        margin-bottom: 4px;
      }
      .post-meta-emoji {
        font-size: 20px;
        line-height: 1;
      }
      .post-info {
        font-size: 14px;
        color: rgba(255,255,255,0.4);
        margin-top: 4px;
      }
      .miniapp-emoji {
        font-size: 56px;
        line-height: 1.1;
        margin-bottom: 12px;
      }
      .miniapp-name {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .miniapp-desc {
        font-size: 14px;
        color: rgba(255,255,255,0.5);
        line-height: 1.5;
      }
      .open-btn {
        display: block;
        width: 100%;
        padding: 14px 24px;
        font-size: 16px;
        font-weight: 600;
        color: #0d0d0d;
        background: #fff;
        border: none;
        border-radius: 12px;
        text-decoration: none;
        text-align: center;
        cursor: pointer;
        transition: opacity 0.15s;
        margin-bottom: 24px;
      }
      .open-btn:hover { opacity: 0.9; }
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        color: rgba(255,255,255,0.25);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .divider::before, .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(255,255,255,0.1);
      }
      .store-links {
        display: flex;
        gap: 12px;
      }
      .store-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px 16px;
        font-size: 14px;
        font-weight: 500;
        color: #fff;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px;
        text-decoration: none;
        transition: background 0.15s;
      }
      .store-btn:hover { background: rgba(255,255,255,0.14); }
      .store-btn svg {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }
      .home-title {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }
      .home-desc {
        font-size: 16px;
        color: rgba(255,255,255,0.5);
        line-height: 1.5;
        margin-bottom: 32px;
      }
      .loading {
        display: none;
        padding: 60px 0;
      }
      .spinner {
        border: 2px solid rgba(255,255,255,0.15);
        border-top-color: #fff;
        border-radius: 50%;
        width: 28px;
        height: 28px;
        animation: spin 0.7s linear infinite;
        margin: 0 auto 16px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .loading-text {
        font-size: 14px;
        color: rgba(255,255,255,0.5);
      }
      @media (max-width: 420px) {
        .store-links { flex-direction: column; gap: 8px; }
        .user-emoji { font-size: 64px; }
        .home-title { font-size: 28px; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Opening in Okeno...</div>
      </div>

      <div id="content">
        <img src="BASE_URL_PLACEHOLDER/assets/images/icon.png" alt="APP_NAME_PLACEHOLDER" class="app-icon" />
        <div class="app-name">APP_NAME_PLACEHOLDER</div>

        CONTENT_HTML_PLACEHOLDER
      </div>
    </div>

    <script>
      (function () {
        var ua = navigator.userAgent;
        var isAndroid = /Android/i.test(ua);
        var isIOS = /iPhone|iPad|iPod/i.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

        if (isAndroid || isIOS) {
          var p = window.location.pathname;
          var deepLink = "okeno:/";
          if (p.startsWith("/u/")) {
            deepLink = "okeno:/" + p;
          } else if (p.startsWith("/post/")) {
            deepLink = "okeno:/" + p;
          } else if (p.startsWith("/mini-app/")) {
            deepLink = "okeno:/" + p;
          }

          var loading = document.getElementById("loading");
          var content = document.getElementById("content");
          loading.style.display = "block";
          content.style.display = "none";

          window.location.href = deepLink;
          setTimeout(function () {
            loading.style.display = "none";
            content.style.display = "block";
          }, 600);
        }
      })();
    </script>
  </body>
</html>
