databases:
  - name: okeno-db
    plan: free
    region: frankfurt
    databaseName: okeno
    user: okeno_user

services:
  - type: web
    name: okeno-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npm run server:build && npx drizzle-kit push
    startCommand: npm run server:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: okeno-db
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
